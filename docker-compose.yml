version: '3.8'

services:
  db-us:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-us:
    build: .
    environment:
      REGION_ID: us
      PORT: 3000
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      DB_HOST: db-us
      DB_PORT: 5432
      PEER_URLS: http://region-eu:3000,http://region-apac:3000
      REPLICATION_INTERVAL: 5000
    ports:
      - "3001:3000"
    depends_on:
      db-us:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-eu:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-eu:
    build: .
    environment:
      REGION_ID: eu
      PORT: 3000
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      DB_HOST: db-eu
      DB_PORT: 5432
      PEER_URLS: http://region-us:3000,http://region-apac:3000
      REPLICATION_INTERVAL: 5000
    ports:
      - "3002:3000"
    depends_on:
      db-eu:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-apac:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-apac:
    build: .
    environment:
      REGION_ID: apac
      PORT: 3000
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      DB_HOST: db-apac
      DB_PORT: 5432
      PEER_URLS: http://region-us:3000,http://region-eu:3000
      REPLICATION_INTERVAL: 5000
    ports:
      - "3003:3000"
    depends_on:
      db-apac:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
